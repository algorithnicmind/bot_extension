<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mitra AI Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo-placeholder">🌟</div>
        <h1>Mitra AI Options</h1>
      </div>

      <div class="card">
        <h2>API Configuration</h2>
        <p class="desc">
          Enter your API key below. Keys are stored locally on your device and
          never sent to our servers.
        </p>

        <div class="form-group">
          <label for="provider">AI Provider:</label>
          <select id="provider">
            <option value="gemini">Google Gemini (Recommended)</option>
            <option value="openai">OpenAI (ChatGPT)</option>
            <option value="anthropic">Anthropic (Claude)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="apiKey">API Key:</label>
          <input
            type="password"
            id="apiKey"
            placeholder="Paste your API key here..."
            autocomplete="off"
          />
          <br />
          <small id="keyHelperText"
            >Get your Gemini key
            <a href="https://aistudio.google.com/app/apikey" target="_blank"
              >here</a
            >.</small
          >
        </div>

        <button type="button" id="saveBtn" class="primary-btn">Save Configuration</button>
        <div id="status" class="status-message"></div>
      </div>
    </div>

    <script src="options.js" type="module"></script>
  </body>
</html>
