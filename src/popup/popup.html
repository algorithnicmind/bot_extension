<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Assistant</title>
  <link rel="stylesheet" href="popup.css">
  <!-- Load Markdown Parser -->
  <script src="../../assets/lib/marked.umd.js"></script>
</head>
<body>

  <div class="header">
    <div class="header-logo">
      <span>✨</span> AI Assistant
    </div>
    <button type="button" class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
  </div>

  <div class="actions-grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
    <button type="button" class="action-btn" id="btnSummarize">
      <span class="emoji">📝</span> Summarize
    </button>
    <button type="button" class="action-btn" id="btnTranslate">
      <span class="emoji">🌐</span> Translate
    </button>
    <button type="button" class="action-btn" id="btnExplain" disabled title="Highlight text on the page first" style="grid-column: span 2;">
      <span class="emoji">🧠</span> Explain Selected Text
    </button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="welcome-msg" id="welcomeMsg">
      <p>Hello! I'm ready to help.</p>
      <p>Click "Summarize Page" to get started.</p>
    </div>
    
    <div class="loader" id="loader">
      ✨ Processing with AI...
    </div>

    <!-- Results injected here -->
    <div id="outputContainer"></div>
  </div>

  <div class="chat-input-container" style="padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 8px; background-color: var(--bg);">
    <input type="text" id="chatInput" placeholder="Ask about this page..." style="flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: inherit;">
    <button type="button" id="btnChat" style="background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: background 0.2s;">Ask</button>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
